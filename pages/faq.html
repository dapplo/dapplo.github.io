---
layout: page
title: FAQ
tags: [FAQ, dapplo]
---
{% assign sorted_faqs = site.faqs | sort:"sort_id" %}

<div id="user_accordion">
  {% for faq in sorted_faqs %}
  <details class="faq-item">
    <summary>{{ faq.title }}</summary>
    <div class="faq-answer">
      {{ faq.content | markdownify }}
    </div>
  </details>
  {% endfor %}
</div>
